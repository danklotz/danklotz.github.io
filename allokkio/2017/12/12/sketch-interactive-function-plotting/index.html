<section><div id="sketch-holder" align ="justify"></div>

<script src="../../../../p5.js"></script>
<script>
// actual script ---------------------------------------------------------------
let c_size = 450
let midpoint = 0.5*c_size;
let resolution = 10;
let x1 = 0;
let y1 = 0;
let grid_div = 15;
let k = 0.5;
let offset_y = midpoint;
let all_time = 0;
let t_step = 0.005;


function setup() {

  var canvas = createCanvas(c_size, c_size);
  canvas.parent('sketch-holder');
  //noLoop();

}


function draw() {
  // background:
  background("#EEEDE4");


  strokeWeight(1);
  stroke(50,50,50,150);
  line(midpoint,0,midpoint,c_size)
  line(0,midpoint,c_size,midpoint)
  //
  stroke(50,50,50,23);
  for (let i=0; i<=c_size/grid_div; i++) {
    line(i*grid_div, 0, i*grid_div, c_size);
    line( 0, i*grid_div, c_size, i*grid_div);
  }
  // update stuff:
  all_time += t_step
  k = 0.03 + 0.1*noise(all_time);
  if (mouseIsPressed) {
    offset_y = mouseY
  }

  // functions:
  set_fuse()
    f_fuse(offset_y)
  set_f1()
      f1()
  set_f2()
      f2(offset_y)
  // boarder
  stroke(100,100,100);
  strokeWeight(1);
  line(0, 0, 0, c_size);
  line(0, 0, c_size, 0);
  line(c_size-1, 0, c_size-1, c_size-1);
  line(0, c_size-1, c_size-1, c_size-1);
  // description
  textSize(20);
  set_f1();
  line(10, c_size - 65, 20, c_size - 65);
  noStroke();
  text("f2", 27, c_size - 59);
  set_f2();
  line(10, c_size - 40, 20, c_size - 40);
  noStroke();
  text("f2", 27, c_size - 34);
  set_fuse();
  line(10, c_size - 15, 20, c_size - 15);
  noStroke();
  text("f3", 27, c_size - 9);
  //
  text("smoothness:", c_size - 145, c_size - 9);
  text(round(1/k), c_size - 30, c_size - 9);
}

function set_f1() {
  strokeWeight(2);
  fill(142,181,102);
  stroke(142,181,102);
}
function set_f2() {
  strokeWeight(2);
  stroke(255, 141, 30);
  fill(255, 141, 30);
}
function set_fuse() {
  strokeWeight(5);
  stroke(30,144,255);
  fill(30,144,255,180);
}

function f1() {
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      y1 = midpoint - 0.02*(i-midpoint)**2 + 150;
      curveVertex(x1,y1);
    }
  endShape();
}
function f2(offset) {
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      y1 = offset + 0.5*(i-midpoint);
      curveVertex(x1,y1);
    }
  endShape();

  set_f2();
  noStroke()
  ellipse(midpoint, offset, 50, 50)
  fill("#EEEDE4")
  textSize(18)
  text("click", midpoint-17, offset+5)
}

function f_fuse(offset) {
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      let y1 = k*( offset + 0.5*(i-midpoint) );
      let y2 = k*( midpoint - 0.02*(i-midpoint)**2 + 150 );
      let le_max = max(y1, y2);
      let le_min = min(y1, y2);
      y3 = ( le_max + log(1.0 + exp(le_min - le_max)) )/k;
      curveVertex(x1,y3);
    }
  endShape();
}

</script>
