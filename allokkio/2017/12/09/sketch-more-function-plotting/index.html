<section><div id="sketch-holder" align ="justify"></div>

<script src="../../../../p5.js"></script>
<script>
// actual script ---------------------------------------------------------------
var c_size = 450
var midpoint = 0.5*c_size;
var resolution = 10;
var x1 = 0;
var y1 = 0;
var grid_div = 15;



function setup() {
  background("#DDDCD3");
  var canvas = createCanvas(c_size, c_size);
  canvas.parent('sketch-holder');
  noLoop();
  strokeWeight(1);
  stroke(50,50,50,150);
  line(midpoint,0,midpoint,c_size)
  line(0,midpoint,c_size,midpoint)
  //
  stroke(50,50,50,23);
  for (var i=0; i<=c_size/grid_div; i++) {
    line(i*grid_div, 0, i*grid_div, c_size);
    line( 0, i*grid_div, c_size, i*grid_div);
  }
}


function draw() {
  f1()
  f2()
  f_fuse()
  // boarder
  stroke(100,100,100);
  strokeWeight(1);
  line(0, 0, 0, c_size);
  line(0, 0, c_size, 0);
  line(c_size-1, 0, c_size-1, c_size-1);
  line(0, c_size-1, c_size-1, c_size-1);
}

function f1() {
  stroke(100,100,250);
  strokeWeight(2);
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      y1 = midpoint - 0.02*(i-midpoint)**2 + 150;
      curveVertex(x1,y1);
    }
  endShape();
}

function f2() {
  stroke(100,100,100);
  strokeWeight(2);
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      y1 = midpoint + 0.5*(i-midpoint);
      curveVertex(x1,y1);
    }
  endShape();
}

function f_fuse() {
  stroke(30,144,255,120);
  strokeWeight(5);
  noFill();
  beginShape();
    for (var i=0; i<=c_size; i++) {
      x1 = c_size - i;
      y1 = max(midpoint + 0.5*(i-midpoint),midpoint - 0.02*(i-midpoint)**2 + 150);
      curveVertex(x1,y1);
    }
  endShape();
}

</script>
