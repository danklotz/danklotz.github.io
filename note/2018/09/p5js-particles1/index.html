<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.5.16/p5.js"></script>
<script>
// actual script ---------------------------------------------------------------
function setup() {
  var canvas = createCanvas(720, 450);
  canvas.parent('sketch-holder');
  system = new ParticleSystem(createVector(width/2, 50));
}

function draw() {
  background(20,30,50, 150);
  system.addParticle();
  system.run();

}

// A simple Particle class
var Particle = function(position) {
  this.acceleration = createVector(-0.00015*(mouseX-0.5*width),-0.00012*(mouseY-0.5*height));
  this.velocity = createVector(random(-0.5, 0.5), random(-1, 0));
    this.old_position = position.copy();
  this.position = position.copy();
  this.lifespan = 255;
};

Particle.prototype.run = function() {
  this.update();
  this.display();
};

// Method to update position
Particle.prototype.update = function(){
  this.velocity.add(this.acceleration);
    var weight = 0.5+0.5*this.lifespan/255
    this.old_position.x = weight*this.old_position.x + (1-weight)*this.position.x;
    this.old_position.y = weight*this.old_position.y + (1-weight)*this.position.y;
  this.position.add(this.velocity);
    //this.position.x = 0.995*this.position.x + 0.005*width
    //this.position.y = 0.995*this.position.y + 0.005*height
  this.lifespan -= 1.5;
};

// Method to display
Particle.prototype.display = function() {
    strokeWeight(1);
    stroke(255-0.85*this.lifespan, 0.75*this.lifespan, 200+0.001*this.lifespan, this.lifespan);
    line(this.old_position.x, this.old_position.y, this.position.x, this.position.y);
  strokeWeight(2);
  fill(255-0.85*this.lifespan, 0.75*this.lifespan, 200+0.001*this.lifespan, 0.96*this.lifespan);
  ellipse(this.position.x, this.position.y, 15*this.lifespan/255, 15*this.lifespan/255);
};

// Is the particle still useful?
Particle.prototype.isDead = function(){
  return this.lifespan < 0;
};

var ParticleSystem = function(position) {
  this.origin = position.copy();
  this.particles = [];
};

ParticleSystem.prototype.addParticle = function() {
  this.particles.push(new Particle(createVector(mouseX, mouseY)));
};

ParticleSystem.prototype.run = function() {
  for (var i = this.particles.length-1; i >= 0; i--) {
    var p = this.particles[i];
    p.run();
    if (p.isDead()) {
      this.particles.splice(i, 1);
    }
  }
};
</script>
